name: Nightly Positional Trading Scan

on:
  schedule:
    # Runs at 16:05 IST (10:35 UTC), Monday through Friday
    - cron: '35 10 * * 1-5'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  scan_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necessary to commit back to repo

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Nightly Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python src/main.py

    - name: Commit and Push Database Updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/universe.duckdb
        git commit -m "Update DuckDB EOD data [skip ci]" || echo "No database updates to commit"
        git push origin main
